        value: (?i:\.cookie\b.*?;\W*?(?:expires|domain)\W*?=|\bhttp-equiv\W+set-cookie\b)
    metadata:
      id: 943100
      message: 'Possible Session Fixation Attack: Setting Cookie Values in HTML'
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-fixation
      - paranoia-level/1
      - OWASP_CRS/ATTACK-SESSION-FIXATION
      - capec/1000/225/21/593/61
  - actions:
