      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{TX.943110_MATCHED_VAR_NAME}:
          %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.943110_matched_var_name=%{matched_var_name}
    conditions:
