apiVersion: seclang.kubewaf.io/v1beta1
kind: SecRule
metadata:
  labels:
    app.kubernetes.io/part-of: coreruleset
    coreruleset/file: RESPONSE-956-DATA-LEAKAGES-RUBY.conf
    coreruleset/version: 4.3.0
  name: crs-response-956-data-leakages-ruby
spec:
  secLangRules:
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - Content-Encoding
        name: RESPONSE_HEADERS
      operator:
        name: pm
        value: gzip compress deflate br zstd
    metadata:
      id: 956010
      phase: "4"
      tags:
      - OWASP_CRS/DATA-LEAKAGES-RUBY
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 956011
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 956012
      phase: "4"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}'
      - nonDisruptiveActionType: setvar
        value: TX.outbound_anomaly_score_pl1=+%{tx.error_anomaly_score}
    conditions:
    - operator:
        name: pmFromFile
        value: ruby-errors.data
      variables:
      - name: RESPONSE_BODY
    metadata:
      id: 956100
      message: RUBY Information Leakage
      phase: "4"
      severity: ERROR
      tags:
      - application-multi
      - language-ruby
      - platform-multi
      - attack-disclosure
      - paranoia-level/1
      - OWASP_CRS/DATA-LEAKAGES-RUBY
      - capec/1000/118/116
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 956013
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 956014
      phase: "4"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}'
      - nonDisruptiveActionType: setvar
        value: TX.outbound_anomaly_score_pl2=+%{tx.error_anomaly_score}
    conditions:
    - operator:
        name: rx
        value: (?i)(?:<%[=#\s]|#\{[^}]+\})
      variables:
      - name: RESPONSE_BODY
    metadata:
      comment: |+
        Detect the presence of the Ruby ERB templates "<%", "<%= " and slim interpolation "#{}" in output.

        To prevent false positives (due to the short "<%" sequences), we also check for [#=\s] after an opening tag.

        This rule is placed at PL-2 since it also matches common templating format with various JavaScript templating engines.

      id: 956110
      message: Ruby source code leakage
      phase: "4"
      severity: ERROR
      tags:
      - application-multi
      - language-ruby
      - platform-multi
      - attack-disclosure
      - paranoia-level/2
      - OWASP_CRS/DATA-LEAKAGES-RUBY
      - capec/1000/118/116
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 956015
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 956016
      phase: "4"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "4"
    metadata:
      comment: |+
        -= Paranoia Level 3 =- (apply only when tx.detection_paranoia_level is sufficiently high: 3 or higher)

      id: 956017
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-956-DATA-LEAKAGES-RUBY
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "4"
    metadata:
      id: 956018
      phase: "4"
    secMarker: END-RESPONSE-956-DATA-LEAKAGES-RUBY
