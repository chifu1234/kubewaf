apiVersion: seclang.kubewaf.io/v1beta1
kind: SecRule
metadata:
  labels:
    app.kubernetes.io/part-of: coreruleset
    coreruleset/file: REQUEST-930-APPLICATION-ATTACK-LFI.conf
    coreruleset/version: 4.3.0
  name: crs-request-930-application-attack-lfi
spec:
  secLangRules:
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 930011
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 930012
      phase: "2"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.lfi_score=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: ARGS
      - excludes:
        - Referer
        name: REQUEST_HEADERS
      - name: FILES
      - arguments:
        - /*
        name: XML
      operator:
        name: rx
        value: (?i)(?:[/\x5c]|%(?:2(?:f|5(?:2f|5c|c(?:1%259c|0%25af))|%46)|5c|c(?:0%(?:[2aq]f|5c|9v)|1%(?:[19p]c|8s|af))|(?:bg%q|(?:e|f(?:8%8)?0%8)0%80%a)f|u(?:221[56]|EFC8|F025|002f)|%3(?:2(?:%(?:%6|4)6|F)|5%%63)|1u)|0x(?:2f|5c))(?:\.(?:%0[01]|\?)?|\?\.?|%(?:2(?:(?:5(?:2|c0%25a))?e|%45)|c0(?:\.|%[256aef]e)|u(?:(?:ff0|002)e|2024)|%32(?:%(?:%6|4)5|E)|(?:e|f(?:(?:8|c%80)%8)?0%8)0%80%ae)|0x2e){2,3}(?:[/\x5c]|%(?:2(?:f|5(?:2f|5c|c(?:1%259c|0%25af))|%46)|5c|c(?:0%(?:[2aq]f|5c|9v)|1%(?:[19p]c|8s|af))|(?:bg%q|(?:e|f(?:8%8)?0%8)0%80%a)f|u(?:221[56]|EFC8|F025|002f)|%3(?:2(?:%(?:%6|4)6|F)|5%%63)|1u)|0x(?:2f|5c))
      variables:
      - name: REQUEST_URI_RAW
    metadata:
      id: 930100
      message: Path Traversal Attack (/../) or (/.../)
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-lfi
      - paranoia-level/1
      - OWASP_CRS/ATTACK-LFI
      - capec/1000/255/153/126
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: multiMatch
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.lfi_score=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: ARGS
      - excludes:
        - Referer
        name: REQUEST_HEADERS
      - name: FILES
      - arguments:
        - /*
        name: XML
      operator:
        name: rx
        value: (?:(?:^|[\x5c/;])\.{2,3}[\x5c/;]|[\x5c/;]\.{2,3}[\x5c/;])
      variables:
      - name: REQUEST_URI_RAW
    metadata:
      comment: |+
        [ Decoded /../ or /..;/ Payloads ]

        To prevent '..' from triggering, the regexp is split into two parts:
        - ../
        - /..
        OR
        - .../
        - /...

        Semicolon added to prevent path traversal via reverse proxy mapping '/..;/' (Tomcat)

      id: 930110
      message: Path Traversal Attack (/../) or (/.../)
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-lfi
      - paranoia-level/1
      - OWASP_CRS/ATTACK-LFI
      - capec/1000/255/153/126
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.lfi_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: REQUEST_COOKIES
      - name: REQUEST_COOKIES_NAMES
      - name: ARGS_NAMES
      - name: ARGS
      - arguments:
        - /*
        name: XML
      operator:
        name: pmFromFile
        value: lfi-os-files.data
    metadata:
      comment: |
        -=[ OS File Access ]=-

        We check for OS file access with the help of a local file with OS files data.

        Ref: https://github.com/lightos/Panoptic/blob/master/cases.xml

        If you wonder where support for Google OAuth2 has gone, see:
        https://github.com/coreruleset/google-oauth2-plugin
      id: 930120
      message: OS File Access Attempt
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-lfi
      - paranoia-level/1
      - OWASP_CRS/ATTACK-LFI
      - capec/1000/255/153/126
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.lfi_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - operator:
        name: pmFromFile
        value: restricted-files.data
      variables:
      - name: REQUEST_FILENAME
    metadata:
      comment: |+
        -=[ Restricted File Access ]=-

        Detects attempts to retrieve application source code, metadata,
        credentials and version control history possibly reachable in a web root.

      id: 930130
      message: Restricted File Access Attempt
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-lfi
      - paranoia-level/1
      - OWASP_CRS/ATTACK-LFI
      - capec/1000/255/153/126
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 930013
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 930014
      phase: "2"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.lfi_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Referer
        - User-Agent
        name: REQUEST_HEADERS
      operator:
        name: pmFromFile
        value: lfi-os-files.data
    metadata:
      id: 930121
      message: OS File Access Attempt in REQUEST_HEADERS
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-lfi
      - paranoia-level/2
      - OWASP_CRS/ATTACK-LFI
      - capec/1000/255/153/126
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 930015
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 930016
      phase: "2"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "4"
    metadata:
      comment: |+
        -= Paranoia Level 3 =- (apply only when tx.detection_paranoia_level is sufficiently high: 3 or higher)

      id: 930017
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-930-APPLICATION-ATTACK-LFI
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "4"
    metadata:
      id: 930018
      phase: "2"
    secMarker: END-REQUEST-930-APPLICATION-ATTACK-LFI
