apiVersion: seclang.kubewaf.io/v1beta1
kind: SecRule
metadata:
  labels:
    app.kubernetes.io/part-of: coreruleset
    coreruleset/file: REQUEST-921-PROTOCOL-ATTACK.conf
    coreruleset/version: 4.3.0
  name: crs-request-921-protocol-attack
spec:
  secLangRules:
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-921-PROTOCOL-ATTACK
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 921011
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-921-PROTOCOL-ATTACK
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 921012
      phase: "2"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: ARGS_NAMES
      - name: ARGS
      - arguments:
        - /*
        name: XML
      operator:
        name: rx
        value: (?:get|post|head|options|connect|put|delete|trace|track|patch|propfind|propatch|mkcol|copy|move|lock|unlock)\s+[^\s]+\s+http/\d
      variables:
      - name: REQUEST_BODY
    metadata:
      id: 921110
      message: HTTP Request Smuggling Attack
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/33
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: REQUEST_COOKIES
      - name: REQUEST_COOKIES_NAMES
      - name: ARGS_NAMES
      - name: ARGS
      - arguments:
        - /*
        name: XML
      operator:
        name: rx
        value: '[\r\n]\W*?(?:content-(?:type|length)|set-cookie|location):\s*\w'
    metadata:
      comment: |+
        -=[ HTTP Response Splitting ]=-

        [ Rule Logic ]
        These rules look for Carriage Return (CR) %0d and Linefeed (LF) %0a characters.
        These characters may cause problems if the data is returned in a response header and
        may be interpreted by an intermediary proxy server and treated as two separate
        responses.

        [ References ]
        http://projects.webappsec.org/HTTP-Response-Splitting

      id: 921120
      message: HTTP Response Splitting Attack
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/34
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: REQUEST_COOKIES
      - name: REQUEST_COOKIES_NAMES
      - name: ARGS_NAMES
      - name: ARGS
      - arguments:
        - /*
        name: XML
      operator:
        name: rx
        value: (?:\bhttp/\d|<(?:html|meta)\b)
    metadata:
      id: 921130
      message: HTTP Response Splitting Attack
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/34
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: REQUEST_HEADERS_NAMES
      - name: REQUEST_HEADERS
      operator:
        name: rx
        value: '[\n\r]'
    metadata:
      comment: |+
        -=[ HTTP Header Injection ]=-

        [ Rule Logic ]
        These rules look for Carriage Return (CR) %0d and Linefeed (LF) %0a characters,
        on their own or in combination with header field names.
        These characters may cause problems if the data is returned in a response header
        and interpreted by the client.
        The rules are similar to rules defending against the HTTP Request Splitting and
        Request Smuggling rules.

        [ References ]
        https://en.wikipedia.org/wiki/HTTP_header_injection

      id: 921140
      message: HTTP Header Injection Attack via headers
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/273
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: ARGS_NAMES
      operator:
        name: rx
        value: '[\n\r]'
    metadata:
      comment: |+
        Detect newlines in argument names.
        Checking for GET arguments has been moved to paranoia level 2 (921151)
        in order to mitigate possible false positives.

        This rule is also triggered by the following exploit(s):
        [ SAP CRM Java vulnerability CVE-2018-2380 - Exploit tested: https://www.exploit-db.com/exploits/44292 ]

      id: 921150
      message: HTTP Header Injection Attack via payload (CR/LF detected)
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/33
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: ARGS_GET_NAMES
      - name: ARGS_GET
      operator:
        name: rx
        value: '[\n\r]+(?:\s|location|refresh|(?:set-)?cookie|(?:x-)?(?:forwarded-(?:for|host|server)|host|via|remote-ip|remote-addr|originating-IP))\s*:'
    metadata:
      id: 921160
      message: HTTP Header Injection Attack via payload (CR/LF and header-name detected)
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/33
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - operator:
        name: rx
        value: '[\n\r]'
      variables:
      - name: REQUEST_FILENAME
    metadata:
      comment: |+
        -=[ HTTP Splitting ]=-

        This rule detect \n or \r in the REQUEST FILENAME
        Reference: https://wiki.owasp.org/index.php/Testing_for_HTTP_Splitting/Smuggling_(OTG-INPVAL-016)
        Reference: https://owasp.org/www-project-web-security-testing-guide/assets/archive/OWASP_Testing_Guide_v4.pdf

      id: 921190
      message: HTTP Splitting (CR/LF in request filename detected)
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/34
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: REQUEST_COOKIES
      - name: REQUEST_COOKIES_NAMES
      - name: ARGS_NAMES
      - name: ARGS
      - arguments:
        - /*
        name: XML
      operator:
        name: rx
        value: ^[^:\(\)\&\|\!<>\~]*\)\s*(?:\((?:[^,\(\)\=\&\|\!<>\~]+[><~]?=|\s*[&!|]\s*(?:\)|\()?\s*)|\)\s*\(\s*[\&\|\!]\s*|[&!|]\s*\([^\(\)\=\&\|\!<>\~]+[><~]?=[^:\(\)\&\|\!<>\~]*)
    metadata:
      comment: |
        -=[ LDAP Injection ]=-

        [ Rule Logic ]

        This is a rule trying to prevent LDAP injection. It is based on a BlackHat presentation by Alonso Parada
        and regex writing by Denis Kolegov.

        [ References ]
        * https://www.blackhat.com/presentations/bh-europe-08/Alonso-Parada/Whitepaper/bh-eu-08-alonso-parada-WP.pdf
        * https://www.sonarsource.com/blog/joomla-takeover-in-20-seconds-with-ldap-injection-cve-2017-14596/
        * https://github.com/SpiderLabs/owasp-modsecurity-crs/issues/276#issue-126581660
      id: 921200
      message: LDAP Injection Attack
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-ldap
      - platform-multi
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/152/248/136
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Content-Type
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: ^[^\s\x0b,;]+[\s\x0b,;].*?(?:application/(?:.+\+)?json|(?:application/(?:soap\+)?|text/)xml)
    metadata:
      comment: |+
        -=[ Body Processor Bypass ]=-

        [ Rule Logic ]

        This rule intends to detect content types in the Content-Type header outside of the actual content type declaration.
        This prevents bypasses targeting the Modsecurity recommended rules controlling which body processor is used.

        Regular expression generated from regex-assembly/921421.ra.
        To update the regular expression run the following shell script
        (consult https://coreruleset.org/docs/development/regex_assembly/ for details):
          crs-toolchain regex update 921421

      id: 921421
      message: 'Content-Type header: Dangerous content type outside the mime type
        declaration'
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/255/153
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - operator:
        name: rx
        value: unix:[^|]*\|
      variables:
      - name: REQUEST_URI_RAW
    metadata:
      comment: |+
        Rule against CVE-2021-40438:
        A crafted request uri-path can cause mod_proxy to forward the request to an origin server choosen by the remote user.
        This issue affects Apache HTTP Server 2.4.48 and earlier.
        GET /?unix:AAAAAAAAAAAAA|http://coreruleset.org/

      id: 921240
      message: mod_proxy attack attempt detected
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-apache
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/33
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - /\x22?\x24Version/
        name: REQUEST_COOKIES
      operator:
        name: strEq
        value: "1"
    metadata:
      comment: |
        Detection for old V1 cookie format from RFC 2109.

        This has been abused by the cookie sandwich technique, in diverse issues affecting Apache Tomcat, Python, and maybe others.
        RFC 6265 deprecated and replaced RFCs 2109 and 2965.
        It completely removed "$Version", meaning user agents and servers no longer use this attribute.
        See:
        - https://portswigger.net/research/stealing-httponly-cookies-with-the-cookie-sandwich-technique
        - https://github.com/owasp-modsecurity/ModSecurity/wiki/Reference-Manual-%28v2.x%29#seccookieformat
      id: 921250
      message: Old Cookies V1 usage attempt detected
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/33
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-921-PROTOCOL-ATTACK
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 921013
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-921-PROTOCOL-ATTACK
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 921014
      phase: "2"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: ARGS_GET
      operator:
        name: rx
        value: '[\n\r]'
    metadata:
      id: 921151
      message: HTTP Header Injection Attack via payload (CR/LF detected)
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/2
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220/33
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl2=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Content-Type
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: ^[^\s\x0b,;]+[\s\x0b,;].*?\b(?:((?:tex|multipar)t|application)|((?:audi|vide)o|image|cs[sv]|(?:vn|relate)d|p(?:df|lain)|json|(?:soa|cs)p|x(?:ml|-www-form-urlencoded)|form-data|x-amf|(?:octe|repor)t|stream)|([\+/]))\b
    metadata:
      comment: |+
        -=[ Body Processor Bypass ]=-

        [ Rule Logic ]

        This rule intends to detect content types in the Content-Type header outside of the actual content type declaration.

        [ References ]
        * See rule 921422

        Regular expression generated from regex-assembly/921422.ra.
        To update the regular expression run the following shell script
        (consult https://coreruleset.org/docs/development/regex_assembly/ for details):
          crs-toolchain regex update 921422

      id: 921422
      message: 'Content-Type header: Dangerous content type outside the mime type
        declaration'
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/2
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/255/153
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-921-PROTOCOL-ATTACK
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 921015
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-921-PROTOCOL-ATTACK
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 921016
      phase: "2"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: Header %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl3=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Range
        count: true
        name: REQUEST_HEADERS
      operator:
        name: gt
        value: "0"
    metadata:
      id: 921230
      message: HTTP Range Header detected
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/3
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/210/272/220
  - actions:
      disruptive:
        disruptiveActionType: pass
      non-disruptive:
      - nonDisruptiveActionType: nolog
      - nonDisruptiveActionType: setvar
        value: TX.paramcounter_%{MATCHED_VAR_NAME}=+1
    conditions:
    - collections:
      - name: ARGS_NAMES
      operator:
        name: rx
        value: .
    metadata:
      comment: |+
        -=[ HTTP Parameter Pollution ]=-

        [ Rule Logic ]
        These rules look for multiple parameters with the same name.
        921170 counts the occurrences of the individual parameters.
        921180 checks if any counter is > 1.

        One HPP attack vector is to try evade signature filters by distributing the
        attack payload across multiple parameters with the same name.
        This works as many security devices only apply signatures to individual
        parameter payloads, however the back-end web application may (in the case
        of ASP.NET) consolidate all of the payloads into one thus making the
        attack payload active.

        This rule is not compatible with application endpoints that accept this
        kind of input: /foo.php?test[]=1&test[]=2

        [ References ]
        http://tacticalwebappsec.blogspot.com/2009/05/http-parameter-pollution.html
        https://capec.mitre.org/data/definitions/460.html

      id: 921170
      phase: "2"
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/152/137/15/460
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.http_violation_score=+%{tx.critical_anomaly_score}
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl3=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - /paramcounter_.*/
        name: TX
      operator:
        name: gt
        value: "1"
    metadata:
      id: 921180
      message: HTTP Parameter Pollution (%{MATCHED_VAR_NAME})
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/3
      - OWASP_CRS/PROTOCOL-ATTACK
      - capec/1000/152/137/15/460
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: log
