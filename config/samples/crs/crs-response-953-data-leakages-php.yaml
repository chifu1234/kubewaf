apiVersion: seclang.kubewaf.io/v1beta1
kind: SecRule
metadata:
  labels:
    app.kubernetes.io/part-of: coreruleset
    coreruleset/file: RESPONSE-953-DATA-LEAKAGES-PHP.conf
    coreruleset/version: 4.3.0
  name: crs-response-953-data-leakages-php
spec:
  secLangRules:
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - Content-Encoding
        name: RESPONSE_HEADERS
      operator:
        name: pm
        value: gzip compress deflate br zstd
    metadata:
      id: 953010
      phase: "4"
      tags:
      - OWASP_CRS/DATA-LEAKAGES-PHP
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 953011
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 953012
      phase: "4"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}'
      - nonDisruptiveActionType: setvar
        value: TX.outbound_anomaly_score_pl1=+%{tx.error_anomaly_score}
    conditions:
    - operator:
        name: pmFromFile
        value: php-errors.data
      variables:
      - name: RESPONSE_BODY
    metadata:
      id: 953100
      message: PHP Information Leakage
      phase: "4"
      severity: ERROR
      tags:
      - application-multi
      - language-php
      - platform-multi
      - attack-disclosure
      - paranoia-level/1
      - OWASP_CRS/DATA-LEAKAGES-PHP
      - capec/1000/118/116
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}'
      - nonDisruptiveActionType: setvar
        value: TX.outbound_anomaly_score_pl1=+%{tx.error_anomaly_score}
    conditions:
    - operator:
        name: rx
        value: (?:\b(?:f(?:tp_(?:nb_)?f?(?:ge|pu)t|get(?:s?s|c)|scanf|write|open|read)|gz(?:(?:encod|writ)e|compress|open|read)|s(?:ession_start|candir)|read(?:(?:gz)?file|dir)|move_uploaded_file|(?:proc_|bz)open|call_user_func)|\$_(?:(?:pos|ge)t|session))\b
      variables:
      - name: RESPONSE_BODY
    metadata:
      comment: |+
        -=[ PHP source code leakage ]=-

        Detect some common PHP keywords in output.

      id: 953110
      message: PHP source code leakage
      phase: "4"
      severity: ERROR
      tags:
      - application-multi
      - language-php
      - platform-multi
      - attack-disclosure
      - paranoia-level/1
      - OWASP_CRS/DATA-LEAKAGES-PHP
      - capec/1000/118/116
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}'
      - nonDisruptiveActionType: setvar
        value: TX.outbound_anomaly_score_pl1=+%{tx.error_anomaly_score}
    conditions:
    - operator:
        name: rx
        value: (?i)<\?(?:=|php)?\s+
      variables:
      - name: RESPONSE_BODY
    metadata:
      comment: |+
        Detect the presence of the PHP open tag "<? ", "<?= " or "<?php " in output.

        To prevent false positives (due to the short "<?" sequences), we also include,
        the space after it in an attempt to stop alerts in binary output.
        And we make it case insensitive.

      id: 953120
      message: PHP source code leakage
      phase: "4"
      severity: ERROR
      tags:
      - application-multi
      - language-php
      - platform-multi
      - attack-disclosure
      - paranoia-level/1
      - OWASP_CRS/DATA-LEAKAGES-PHP
      - capec/1000/118/116
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 953013
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "2"
    metadata:
      id: 953014
      phase: "4"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: 'Matched Data: %{TX.0} found within %{MATCHED_VAR_NAME}'
      - nonDisruptiveActionType: setvar
        value: TX.outbound_anomaly_score_pl2=+%{tx.error_anomaly_score}
    conditions:
    - operator:
        name: rx
        value: (?i)Empty string|F(?:ile size is|reeing memory)|Header (?:name )?\"|Invalid
          date|No active class|(?:Out of memor|cannot be empt)y|Pa(?:ir level|ssword
          is too long)|Re(?:ading file|starting!)|S(?:ession is not active|tatic function\b)|T(?:elling\.\.\.|he
          function\b)|(?:Unknown reas|invalid opti)on|e(?:mpty password|rror reading)
      variables:
      - name: RESPONSE_BODY
    metadata:
      id: 953101
      message: PHP Information Leakage
      phase: "4"
      severity: ERROR
      tags:
      - application-multi
      - language-php
      - platform-multi
      - attack-disclosure
      - paranoia-level/2
      - OWASP_CRS/DATA-LEAKAGES-PHP
      - capec/1000/118/116
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 953015
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "3"
    metadata:
      id: 953016
      phase: "4"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "4"
    metadata:
      comment: |+
        -= Paranoia Level 3 =- (apply only when tx.detection_paranoia_level is sufficiently high: 3 or higher)

      id: 953017
      phase: "3"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-RESPONSE-953-DATA-LEAKAGES-PHP
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "4"
    metadata:
      id: 953018
      phase: "4"
    secMarker: END-RESPONSE-953-DATA-LEAKAGES-PHP
