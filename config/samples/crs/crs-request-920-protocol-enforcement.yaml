apiVersion: seclang.kubewaf.io/v1beta1
kind: SecRule
metadata:
  labels:
    app.kubernetes.io/part-of: coreruleset
    coreruleset/file: REQUEST-920-PROTOCOL-ENFORCEMENT.conf
    coreruleset/version: 4.3.0
  name: crs-request-920-protocol-enforcement
spec:
  secLangRules:
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-920-PROTOCOL-ENFORCEMENT
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 920011
      phase: "1"
  - actions:
      disruptive:
        disruptiveActionType: pass
      flow:
      - flowActionType: skipAfter
        value: END-REQUEST-920-PROTOCOL-ENFORCEMENT
      non-disruptive:
      - nonDisruptiveActionType: nolog
    conditions:
    - collections:
      - arguments:
        - DETECTION_PARANOIA_LEVEL
        name: TX
      operator:
        name: lt
        value: "1"
    metadata:
      id: 920012
      phase: "2"
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{request_line}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}
    conditions:
    - operator:
        name: rx
        negate: true
        value: (?i)^(?:get /[^#\?]*(?:\?[^\s\x0b#]*)?(?:#[^\s\x0b]*)?|(?:connect (?:(?:[0-9]{1,3}\.){3}[0-9]{1,3}\.?(?::[0-9]+)?|[\--9A-Z_a-z]+:[0-9]+)|options
          \*|[a-z]{3,10}[\s\x0b]+(?:[0-9A-Z_a-z]{3,7}?://[\--9A-Z_a-z]*(?::[0-9]+)?)?/[^#\?]*(?:\?[^\s\x0b#]*)?(?:#[^\s\x0b]*)?)[\s\x0b]+[\.-9A-Z_a-z]+)$
      variables:
      - name: REQUEST_LINE
    metadata:
      id: 920100
      message: Invalid HTTP Request Line
      phase: "1"
      severity: WARNING
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: FILES
      operator:
        name: rx
        negate: true
        value: (?i)^(?:&(?:(?:[acegilnorsuz]acut|[aeiou]grav|[aino]tild)e|[c-elnr-tz]caron|(?:[cgklnr-t]cedi|[aeiouy]um)l|[aceg-josuwy]circ|[au]ring|a(?:mp|pos)|nbsp|oslash);|[^\"';=\x5c])*$
      variables:
      - name: FILES_NAMES
    metadata:
      comment: |+
        Identify multipart/form-data name evasion attempts

        There are possible impedance mismatches between how
        ModSecurity interprets multipart file names and how
        a destination app server such as PHP might parse the
        Content-Disposition data:

                   filename-parm := "filename" "=" value

        -=[ Rule Logic ]=-
        These rules check for the existence of the ' " ; = meta-characters in
        either the "name" (FILES) and "filename" (FILES_NAMES) variables.
        HTML entities may lead to false positives, which is why
        frequently used ones, such as "&auml;", are allowed at PL1.

        -=[ Targets, characters and html entities ]=-

        920120: PL1 : FILES_NAMES, FILES
           Disallow ['\";=\\], except for frequently used HTML entities (see 920120.ra).

        920121: PL2 : FILES_NAMES, FILES
           Disallow ['\";=\\]

        -=[ References ]=-
        http://www.ietf.org/rfc/rfc2183.txt

        This rule used to use negative look-behind.
        See https://github.com/coreruleset/coreruleset/wiki/Technical-Decisions-and-Best-Practices#avoiding-negative-look-behind-in-regular-expressions
        for an explanation of why it now uses `!@rx` instead to avoid look-around.

        Regular expression generated from regex-assembly/920120.ra.
        To update the regular expression run the following shell script
        (consult https://coreruleset.org/docs/development/regex_assembly/ for details):
          crs-toolchain regex update 920120

      id: 920120
      message: Attempted multipart/form-data bypass
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Content-Length
        name: REQUEST_HEADERS
      operator:
        name: rx
        negate: true
        value: ^\d+$
    metadata:
      comment: |+
        Accept only digits in content length

        -=[ Rule Logic ]=-
        This rule uses ModSecurity's rule negation against the regex meaning if the Content-Length header
        is NOT all digits, then it will match.

        -=[ References ]=-
        https://www.rfc-editor.org/rfc/rfc9110.html#section-8.6

      id: 920160
      message: Content-Length HTTP header is not numeric
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
    conditions:
    - operator:
        name: rx
        value: ^(?:GET|HEAD)$
      variables:
      - name: REQUEST_METHOD
    metadata:
      comment: |+
        Do not accept GET or HEAD requests with bodies
        In RCF-9110, "A client SHOULD NOT generate content in a HEAD/GET request
        unless it is made directly to an origin server that has previously indicated"

        -=[ Rule Logic ]=-
        The chained rule matches when:
        1) If the request method is GET or HEAD
        AND
        2) Header: Content-Length exists and non-zero

        -=[ References ]=-
        https://www.rfc-editor.org/rfc/rfc9110.html#section-9.3.1
        https://www.rfc-editor.org/rfc/rfc9110.html#section-9.3.2

      id: 920170
      message: GET or HEAD Request with Body Content
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
    conditions:
    - operator:
        name: rx
        value: ^(?:GET|HEAD)$
      variables:
      - name: REQUEST_METHOD
    metadata:
      comment: |+
        This is a sibling of rule 920170

      id: 920171
      message: GET or HEAD Request with Transfer-Encoding
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
    conditions:
    - operator:
        name: within
        negate: true
        value: HTTP/2 HTTP/2.0 HTTP/3 HTTP/3.0
      variables:
      - name: REQUEST_PROTOCOL
    metadata:
      comment: |+
        Require Content-Length or Transfer-Encoding to be provided with
        every POST request if the protocol version is not HTTP/2 or HTTP/3.

        In case of HTTP/2, see the RFC7540 8.1 p52:
        HTTP/2 does not use the Transfer-Encoding: chunked anymore, because
        the underlying transport protocol is already using data frames with
        known length.

        In case of HTTP/3, see the RFC9114 4.1:
        Transfer codings (see Section 7 of [HTTP/1.1]) are not defined for
        HTTP/3; the Transfer-Encoding header field MUST NOT be used.

        -=[ Rule Logic ]=-
        This chained rule checks if the protocol is not HTTP/2 or HTTP/3,
        then checks request method is POST, if so, it checks that a
        Content-Length or Transfer-Encoding headers are also present.

      id: 920180
      message: POST without Content-Length and Transfer-Encoding headers
      phase: "1"
      severity: WARNING
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Transfer-Encoding
        count: true
        name: REQUEST_HEADERS
      operator:
        name: eq
        negate: true
        value: "0"
    - collections:
      - arguments:
        - Content-Length
        count: true
        name: REQUEST_HEADERS
      operator:
        name: eq
        negate: true
        value: "0"
    metadata:
      comment: |+
        As per RFC7230 3.3.2: A sender MUST NOT send a Content-Length
        header field in any message that contains a Transfer-Encoding header
        field.

        Related to 920170, 920171 and 920180.

      id: 920181
      message: Content-Length and Transfer-Encoding headers present
      phase: "1"
      severity: WARNING
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: capture
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
    conditions:
    - collections:
      - arguments:
        - Range
        - Request-Range
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: (\d+)-(\d+)
    metadata:
      comment: |+
        Range Header Check

        RFC7233 2.1 p6:
        "A byte-range-spec is invalid if the last-byte-pos value is present
        and less than the first-byte-pos."

        -=[ Rule Logic ]=-
        This rule compares the first and second byte ranges and flags
        when the first value is greater than the second.

        -=[ References ]=-
        https://datatracker.ietf.org/doc/html/rfc7233
        https://seclists.org/fulldisclosure/2011/Aug/175

      id: 920190
      message: 'Range: Invalid Last Byte Value'
      phase: "1"
      severity: WARNING
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Connection
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: \b(?:keep-alive|close),\s?(?:keep-alive|close)\b
    metadata:
      comment: |+
        Broken/Malicious clients often have duplicate or conflicting headers
        Automated programs and bots often do not obey the HTTP RFC

        -=[ Rule Logic ]=-
        This rule inspects the Connection header and looks for duplicates of the
        keep-alive and close options.

        -=[ References ]=-
        https://datatracker.ietf.org/doc/html/rfc7233

      id: 920210
      message: Multiple/Conflicting Connection Header Data Found
      phase: "1"
      severity: WARNING
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR}'
    conditions:
    - collections:
      - arguments:
        - CRS_VALIDATE_UTF8_ENCODING
        name: TX
      operator:
        name: eq
        value: "1"
    metadata:
      comment: |+
        Check UTF encoding
        We only want to apply this check if UTF-8 encoding is actually used by the site, otherwise
        it will result in false positives.

        -=[ Rule Logic ]=-
        This chained rule first checks to see if the admin has set the TX:CRS_VALIDATE_UTF8_ENCODING
        variable in the crs-setup.conf file.

      id: 920250
      message: UTF8 Encoding Abuse Attack Attempt
      phase: "2"
      severity: WARNING
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/255/153/267
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.warning_anomaly_score}
    conditions:
    - operator:
        name: rx
        value: (?i)%uff[0-9a-f]{2}
      variables:
      - name: REQUEST_URI
      - name: REQUEST_BODY
    metadata:
      comment: |+
        Disallow use of full-width unicode as decoding evasions may be possible.

        -=[ Rule Logic ]=-
        This rule looks for full-width encoding by looking for %u followed by 2 'f'
        characters and then 2 hex characters. It is a vulnerability that affected
        IIS circa 2007.
        The rule will trigger on %uXXXX formatted chars that are full or half
        width, as explained above. This %uXXXX format is passed as a raw parameter
        and is (seemingly only) accepted by IIS (5.0, 6.0, 7.0, and 8.0). Other
        webservers will only process unicode chars presented as hex UTF-8 bytes.

        -=[ References ]=-
        http://www.kb.cert.org/vuls/id/739224
        https://www.checkpoint.com/defense/advisories/public/2007/cpai-2007-201.html
        https://github.com/SpiderLabs/owasp-modsecurity-crs/issues/719

        Regular expression generated from regex-assembly/920260.ra.
        To update the regular expression run the following shell script
        (consult https://coreruleset.org/docs/development/regex_assembly/ for details):
          crs-toolchain regex update 920260

      id: 920260
      message: Unicode Full/Half Width Abuse Attack Attempt
      phase: "2"
      severity: WARNING
      tags:
      - application-multi
      - language-multi
      - platform-iis
      - platform-windows
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/255/153/267/72
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: logdata
        value: '%{MATCHED_VAR_NAME}=%{MATCHED_VAR}'
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - name: REQUEST_HEADERS
      - name: ARGS
      - name: ARGS_NAMES
      operator:
        name: validateByteRange
        value: 1-255
      variables:
      - name: REQUEST_URI_RAW
    metadata:
      comment: |
        Restrict type of characters sent

        This is a rule with multiple stricter siblings that grows more
        restrictive in higher paranoia levels.

        -=[ Rule Logic ]=-
        This rule uses the @validateByteRange operator to restrict the request
        payloads.

        -=[ Targets and ASCII Ranges ]=-

        920270: PL1 : REQUEST_URI, REQUEST_HEADERS, ARGS and ARGS_NAMES
              ASCII 1-255 : Full ASCII range without null character

        920271: PL2 : REQUEST_URI, REQUEST_HEADERS, ARGS and ARGS_NAMES
              ASCII 9,10,13,32-126,128-255 : Full visible ASCII range, tab, newline

        920272: PL3 : REQUEST_URI, REQUEST_HEADERS, ARGS, ARGS_NAMES and REQUEST_BODY
              ASCII 32-36,38-126 : Visible lower ASCII range without percent symbol

        920273: PL4 : ARGS, ARGS_NAMES and REQUEST_BODY
              ASCII 38,44-46,48-58,61,65-90,95,97-122
              A-Z a-z 0-9 = - _ . , : &

        920274: PL4 : REQUEST_HEADERS without User-Agent, Referer, Cookie
                      and Structured Header booleans
              ASCII 32,34,38,42-59,61,65-90,95,97-122
              A-Z a-z 0-9 = - _ . , : & " * + / SPACE

        REQUEST_URI and REQUEST_HEADERS User-Agent, Referer and Cookie are very hard
        to restrict beyond the limits in 920272. Structured Header booleans are
        validated separately in 920275.

        920274 generally has few positives. However, it would detect rare attacks
        on Accept request headers and friends.
      id: 920270
      message: Invalid character in request (null character)
      phase: "2"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: skipAfter
        value: END-HOST-CHECK
      non-disruptive:
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Host
        count: true
        name: REQUEST_HEADERS
      operator:
        name: eq
        value: "0"
    metadata:
      id: 920280
      message: Request Missing a Host Header
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Host
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: ^$
    metadata:
      id: 920290
      message: Empty Host Header
      phase: "1"
      severity: CRITICAL
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
    secMarker: END-HOST-CHECK
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.notice_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Accept
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: ^$
    - operator:
        name: rx
        negate: true
        value: ^OPTIONS$
      variables:
      - name: REQUEST_METHOD
    - collections:
      - arguments:
        - User-Agent
        name: REQUEST_HEADERS
      operator:
        name: pm
        negate: true
        value: AppleWebKit Android Business Enterprise Entreprise
    metadata:
      comment: |+
        Empty Accept Header

        -=[ Rule Logic ]=-
        This rule checks if an Accept header exists, but has an empty value.
        This is only allowed in combination with the OPTIONS method.
        Additionally, there are some clients sending empty Accept headers.
        They are covered in another chained rule checking the User-Agent.
        This technique demands a separate rule to detect an empty
        Accept header if there is no user agent. This is checked via
        the separate rule 920311.

        Exclude some common broken clients sending empty Accept header:
        "Business/6.6.1.2 CFNetwork/758.5.3 Darwin/15.6.0" (CRS issue #515)
        "Entreprise/6.5.0.177 CFNetwork/758.4.3 Darwin/15.5.0" (CRS issue #366)

        -=[ References ]=-
        https://github.com/SpiderLabs/owasp-modsecurity-crs/issues/366

      id: 920310
      message: Request Has an Empty Accept Header
      phase: "1"
      severity: NOTICE
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.notice_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Accept
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: ^$
    - operator:
        name: rx
        negate: true
        value: ^OPTIONS$
      variables:
      - name: REQUEST_METHOD
    - collections:
      - arguments:
        - User-Agent
        count: true
        name: REQUEST_HEADERS
      operator:
        name: eq
        value: "0"
    metadata:
      comment: |+
        This rule is a sibling of rule 920310.

      id: 920311
      message: Request Has an Empty Accept Header
      phase: "1"
      severity: NOTICE
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      non-disruptive:
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.notice_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - User-Agent
        name: REQUEST_HEADERS
      operator:
        name: rx
        value: ^$
    metadata:
      comment: |+
        Empty User-Agent Header

        -=[ Rule Logic ]=-
        This rules will check to see if the User-Agent header is empty.

        Note that there is a second rule, 920320, which will check for
        the existence of the User-Agent header.

      id: 920330
      message: Empty User Agent Header
      phase: "1"
      severity: NOTICE
      tags:
      - application-multi
      - language-multi
      - platform-multi
      - attack-protocol
      - paranoia-level/1
      - OWASP_CRS/PROTOCOL-ENFORCEMENT
      - capec/1000/210/272
  - actions:
      disruptive:
        disruptiveActionType: block
      flow:
      - flowActionType: chain
        value: ""
      non-disruptive:
      - nonDisruptiveActionType: setvar
        value: TX.inbound_anomaly_score_pl1=+%{tx.critical_anomaly_score}
    conditions:
    - collections:
      - arguments:
        - Content-Length
        name: REQUEST_HEADERS
      operator:
        name: rx
        negate: true
        value: ^0$
    - collections:
      - arguments:
        - Content-Type
        count: true
        name: REQUEST_HEADERS
      operator:
        name: eq
        value: "0"
    metadata:
      comment: |
        Missing Content-Type Header with Request Body

        -=[ Rule Logic ]=-
        This rule will first check to see if the value of the Content-Length header is
        non-equal to 0. The chained rule is then checking the existence of the
        Content-Type header. The RFCs do not state there must be a
        Content-Type header. However, a request missing a Content-Header is a
        strong indication of a non-compliant browser or an evasion attempt.

        Also, omitting the CT header allows to bypass the Request Body Processor
        unless you set the optional tx.enforce_bodyproc_urlencoded variable.

        Enabling this rule is important as it maximizes
        the detection of risky practices that attempt to disable
        body processors (such as XML, JSON, etc.) in order to hide
        malicious payloads.

        -=[ References ]=-
        http://httpwg.org/specs/rfc7231.html#header.content-type
