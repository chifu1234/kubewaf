# This rule is not used by the project wafv2 itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the seclang.kubewaf.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: wafv2
    app.kubernetes.io/managed-by: kustomize
  name: seclang-secaction-editor-role
rules:
- apiGroups:
  - seclang.kubewaf.io
  resources:
  - secactions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - seclang.kubewaf.io
  resources:
  - secactions/status
  verbs:
  - get
