---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: secrules.seclang.kubewaf.io
spec:
  group: seclang.kubewaf.io
  names:
    kind: SecRule
    listKind: SecRuleList
    plural: secrules
    singular: secrule
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: |-
          SecRule is the Schema for the secrules API.
          SecRule represents a single ModSecurity/Coraza security rule in Kubernetes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of SecRule.
            properties:
              secLangRules:
                description: SecRules contains the list of SecLang rules that define
                  the WAF behavior.
                items:
                  description: |-
                    SecLangSecRule represents a single ModSecurity/Coraza SecRule in structured form.
                    It consists of metadata, conditions (variables + operator), and actions.
                  properties:
                    actions:
                      description: Actions specify what to do when the rule matches.
                      properties:
                        data:
                          description: |-
                            DataActionTypes are not executed themselves; they provide parameters or values
                            that other actions use.

                            The only commonly seen one is status (e.g., status:403 or status:429),
                            which specifies the HTTP response code for blocking/redirect actions.
                          items:
                            properties:
                              dataActionType:
                                description: |-
                                  DataActionType specifies actions that deal with data manipulation, response control,
                                  or namespace registration — typically used in very specific contexts.

                                  These are less common than disruptive or non-disruptive actions.

                                  ModSecurity: https://github.com/owasp-modsecurity/ModSecurity/wiki/Reference-Manual-%28v3.x%29#actions
                                  Coraza:     https://coraza.io/docs/seclang/actions/

                                  Allowed values:

                                    - status  : sets the HTTP response status code when a disruptive action is triggered
                                    - xlmns   : registers an XML namespace prefix for XPath expressions
                                enum:
                                - status
                                - xmlns
                                type: string
                              value:
                                type: string
                            required:
                            - dataActionType
                            type: object
                          type: array
                        disruptive:
                          description: |-
                            DisruptiveAction specifies an action that interrupts, blocks, allows, or otherwise alters
                            the normal flow of the HTTP transaction when a rule matches.

                            These are the core "decision" actions in ModSecurity/Coraza rulesets.
                            Only one disruptive action is allowed per rule/chain (the last one specified wins).
                          properties:
                            disruptiveActionType:
                              description: |-
                                DisruptiveActionType specifies an action that interrupts, blocks, allows, or otherwise alters
                                the normal flow of the HTTP transaction when a rule matches.

                                These are the core "decision" actions in ModSecurity/Coraza rulesets.
                                Only one disruptive action is allowed per rule/chain (the last one specified wins).

                                ModSecurity: https://github.com/owasp-modsecurity/ModSecurity/wiki/Reference-Manual-%28v3.x%29#actions
                                Coraza:     https://coraza.io/docs/seclang/actions/

                                Allowed values:

                                  - allow     : explicitly allows the transaction (whitelisting / bypass)
                                  - block     : applies the default blocking behavior (SecDefaultAction, usually deny/403)
                                  - deny      : blocks with an error response (e.g. 403)
                                  - drop      : silently drops the TCP connection (no response sent)
                                  - pass      : continues processing without blocking (match logged/scored but no interrupt)
                                  - pause     : delays processing for milliseconds (throttling/testing, rarely used)
                                  - proxy     : proxies/redirects request to another backend (limited support)
                                  - redirect  : issues an HTTP redirect to a new URL
                              enum:
                              - allow
                              - block
                              - deny
                              - drop
                              - pass
                              - pause
                              - proxy
                              - redirect
                              type: string
                            value:
                              type: string
                          required:
                          - disruptiveActionType
                          type: object
                        flow:
                          description: |-
                            FlowActionTypes control how rule evaluation proceeds within the current processing phase.

                            The most frequently used is chain, which links multiple conditions together
                            (creating AND logic across rules). In chained rules, only the first rule should
                            contain a disruptive action.

                            Other examples: skip (skip the next N rules), skipAfter (jump to a marker).
                          items:
                            properties:
                              flowActionType:
                                description: |-
                                  FlowActionType specifies a flow-control (rule chaining / skipping) action as defined in ModSecurity / Coraza.

                                  These actions influence rule evaluation order and chaining rather than directly blocking or logging.

                                  ModSecurity: https://github.com/owasp-modsecurity/ModSecurity/wiki/Reference-Manual-%28v3.x%29#actions
                                  Coraza:     https://coraza.io/docs/seclang/actions/

                                  Allowed values:

                                    - chain     : links this rule to the next one(s), creating AND logic (only first rule in chain can be disruptive)
                                    - skip      : skips the next N rules in the current phase on match
                                    - skipAfter : jumps forward to after a SecMarker with the given label on match
                                enum:
                                - chain
                                - skip
                                - skipAfter
                                type: string
                              value:
                                type: string
                            required:
                            - flowActionType
                            - value
                            type: object
                          type: array
                        non-disruptive:
                          description: |-
                            NonDisruptiveActionTypes are side-effect actions that run whenever a rule matches,
                            without ever changing the rule evaluation flow or transaction outcome.

                            These actions always execute — including inside chained rules and in detection-only mode.
                            They handle logging, scoring, tagging, variable updates, transformations, metadata,
                            and other utility tasks.

                            Most real-world rules contain many of these (often the majority of the action list).
                            Common examples: msg, tag, severity, setvar, capture, log / nolog, t:*, ctl, initcol, exec.
                          items:
                            properties:
                              nonDisruptiveActionType:
                                description: |-
                                  NonDisruptiveActionType specifies a non-disruptive action as defined in ModSecurity / Coraza.

                                  ModSecurity: https://github.com/owasp-modsecurity/ModSecurity/wiki/Reference-Manual-%28v3.x%29#actions
                                  Coraza:     https://coraza.io/docs/seclang/actions/

                                  Allowed values:

                                    - append          : appends a value to a collection variable (TX, SESSION, IP, ...)
                                    - auditlog        : forces logging of the rule match to the audit log
                                    - capture         : stores regex capture groups into TX.0 … TX.9
                                    - ctl             : runtime control (ruleEngine, auditEngine, requestBodyAccess, …)
                                    - deprecatevar    : marks a persistent variable for removal at end of phase
                                    - exec            : executes an external script/binary
                                    - expirevar       : sets expiration time on a persistent collection variable
                                    - initcol         : initializes a persistent collection (IP, SESSION, …)
                                    - log             : enables normal (non-audit) logging
                                    - logdata         : adds custom data to the audit log entry
                                    - multimatch      : tests every occurrence of a variable (instead of stopping at first match)
                                    - noauditlog      : prevents this rule from being written to the audit log
                                    - nolog           : prevents normal logging of this rule
                                    - sanitiseArg / sanitiseMatched / sanitiseMatchedBytes / sanitiseRequestHeader / sanitiseResponseHeader : various sanitization actions
                                    - setenv          : sets an environment variable
                                    - setrsc          : sets the RESOURCE collection identifier
                                    - setsid          : sets the session identifier
                                    - setuid          : sets the user identifier
                                    - setvar          : creates, modifies, increments or deletes variables
                                enum:
                                - append
                                - auditlog
                                - capture
                                - ctl
                                - deprecatevar
                                - exec
                                - expirevar
                                - initcol
                                - log
                                - logdata
                                - multiMatch
                                - noauditlog
                                - nolog
                                - sanitiseArg
                                - sanitiseMatched
                                - sanitiseMatchedBytes
                                - sanitiseRequestHeader
                                - sanitiseResponseHeader
                                - setenv
                                - setrsc
                                - setsid
                                - setuid
                                - setvar
                                type: string
                              value:
                                type: string
                            required:
                            - nonDisruptiveActionType
                            type: object
                          type: array
                      type: object
                    chainedRule:
                      description: ChainedRule indicates if this is part of a chained
                        rule set.
                      type: boolean
                    conditions:
                      description: Conditions define when the rule should trigger
                        (the "if" part of the rule).
                      items:
                        description: |-
                          Condition represents one matching condition within a SecRule (or SecAction).
                          A condition consists of variables/collections to inspect, an operator to apply,
                          and optional transformations.
                        properties:
                          always-match:
                            description: AlwaysMatch is used for SecAction style unconditional
                              rules.
                            type: boolean
                          collections:
                            description: Collections to evaluate (specialized variable
                              groups).
                            items:
                              description: |-
                                Collection represents a reference to a ModSecurity/Coraza collection in a rule.
                                Collections are named variable containers (transient or persistent) that store
                                data such as request arguments, headers, IP tracking, session state, etc.
                                They are accessed via %{COLLECTION:KEY} syntax or actions like initcol, setvar,
                                setsid, setuid, setrsc.

                                ModSecurity: https://github.com/owasp-modsecurity/ModSecurity/wiki/Reference-Manual-%28v3.x%29#collections
                                Coraza:     https://coraza.io/docs/seclang/variables/
                              properties:
                                arguments:
                                  description: |-
                                    Arguments are key=value pairs or selectors passed to the collection
                                    (e.g. initcol:IP=%{REMOTE_ADDR} or setvar:TX.score=+5).
                                  items:
                                    type: string
                                  type: array
                                count:
                                  description: Count, when true, treats the collection
                                    as a count operator (&COLLECTION).
                                  type: boolean
                                excludes:
                                  description: Excludes are keys to exclude from the
                                    collection (e.g. in ARGS or REQUEST_HEADERS).
                                  items:
                                    type: string
                                  type: array
                                name:
                                  description: Name is the collection to target (e.g.
                                    IP, TX, ARGS, SESSION).
                                  enum:
                                  - UNKNOWN_COLLECTION
                                  - ARGS
                                  - ARGS_GET
                                  - ARGS_GET_NAMES
                                  - ARGS_NAMES
                                  - ARGS_POST_NAMES
                                  - ARGS_POST
                                  - ENV
                                  - FILES
                                  - GEO
                                  - GLOBAL
                                  - IP
                                  - MATCHED_VARS_NAMES
                                  - MATCHED_VARS
                                  - MULTIPART_PART_HEADERS
                                  - PERF_RULES
                                  - REQUEST_COOKIES_NAMES
                                  - REQUEST_COOKIES
                                  - REQUEST_HEADERS_NAMES
                                  - REQUEST_HEADERS
                                  - RESOURCE
                                  - RESPONSE_HEADERS_NAMES
                                  - RESPONSE_HEADERS
                                  - RULE
                                  - SESSION
                                  - TX
                                  - USER
                                  - XML
                                  type: string
                              type: object
                            type: array
                          operator:
                            description: Operator defines the comparison to perform
                              on the variable value(s).
                            properties:
                              name:
                                description: |-
                                  OperatorType is the type of comparison operator used in SecLang conditions.
                                  See https://coraza.io/docs/seclang/rules/#operators for full reference.
                                type: string
                              negate:
                                type: boolean
                              value:
                                type: string
                            required:
                            - name
                            type: object
                          script:
                            description: Script is the path for Lua or other script-based
                              conditions (advanced).
                            type: string
                          transformations:
                            description: Transformations to apply to the variable
                              values before operator evaluation.
                            items:
                              description: |-
                                Transformation represents a data transformation function applied to variables
                                before the operator is evaluated. Transformations can be chained.
                              type: string
                            type: array
                          variables:
                            description: Variables to evaluate in this condition.
                            items:
                              description: |-
                                Variable references a specific piece of data (variable or collection member)
                                to be used in a rule's condition.
                              properties:
                                excluded:
                                  type: boolean
                                name:
                                  description: VariableName identifies a built-in
                                    ModSecurity/Coraza variable or collection.
                                  type: string
                              required:
                              - name
                              type: object
                            type: array
                        type: object
                      type: array
                    metadata:
                      description: Metadata holds identification, phase, severity,
                        message and other rule metadata.
                      properties:
                        comment:
                          description: |-
                            Comment is an arbitrary human-readable note attached to the rule.
                            Not sent to the engine; used only for documentation and tooling.

                            Example: comment:'This rule protects against CVE-2023-1234'
                          type: string
                        id:
                          description: |-
                            Id is the unique numeric identifier of the rule.
                            Required in almost all production rules. Used for rule updates,
                            removal, and referencing (SecRuleRemoveById, SecRuleUpdateActionById).

                            Example: id:900100
                          type: integer
                        maturity:
                          description: |-
                            Maturity indicates the maturity level of the rule (CRS-specific).
                            Range: 0–9 (9 = production-ready, extensively tested).
                            Used by OWASP Core Rule Set to manage rule stability and false-positive risk.

                            Example: maturity:9
                          type: string
                        message:
                          description: |-
                            Msg is the human-readable message describing what the rule detects.
                            Appears in audit logs and alerts when the rule matches.

                            Example: msg:'SQL Injection Attempt'
                          type: string
                        phase:
                          description: |-
                            Phase defines in which processing phase the rule executes.
                            Valid values: 1 (Request Headers), 2 (Request Body),
                            3 (Response Headers), 4 (Response Body), 5 (Logging).

                            Example: phase:2
                          type: string
                        revision:
                          description: |-
                            Rev is the revision of this specific rule (CRS-specific).
                            Allows the same id to be updated over time while tracking changes.

                            Example: rev:'2.1.3'
                          type: string
                        severity:
                          description: |-
                            Severity defines how serious a match is (used for alert prioritization).
                            Can be numeric (0–7) or text (CRITICAL, ERROR, WARNING, NOTICE, INFO).

                            Example: severity:CRITICAL or severity:2
                          type: string
                        tags:
                          description: |-
                            Tags categorise the rule (multiple allowed). Used for filtering,
                            grouping, and removal (SecRuleRemoveByTag).
                            Common CRS tags: WEB_ATTACK/XSS, OWASP_CRS, paranoia-level/1, etc.

                            Example: tag:'WEB_ATTACK/SQL_INJECTION', tag:'paranoia-level/1'
                          items:
                            type: string
                          type: array
                        version:
                          description: |-
                            Ver is the version of the rule set this rule belongs to (CRS-specific).

                            Example: ver:'CRS/4.0.0'
                          type: string
                      type: object
                    secMarker:
                      description: |-
                        SecMarker is a label that can be used with skipAfter actions.
                        It will be emitted after this rule.
                      type: string
                  type: object
                type: array
            type: object
          status:
            description: status defines the observed state of SecRule.
            properties:
              conditions:
                description: Conditions represent the current state of the SecRule
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              ruleSetRefs:
                description: RuleSetRefs tracks which RuleSets reference this SecRule.
                items:
                  description: RuleSetRef identifies a RuleSet that references this
                    SecLang resource.
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
              secRuleString:
                description: SecRuleString contains the rendered SecLang rule string.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
